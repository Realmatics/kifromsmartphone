name: AI Web Builder
on:
  repository_dispatch:
    types: [deploy_preview]

jobs:
  create_file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create index.html
        run: |
          echo "${{ github.event.client_payload.content }}" > index.html

      - name: Commit and Push
        run: |
          git config --global user.name "AI Builder"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Webseite von KI aktualisiert"
          git push
          
