name: AI Web Builder
on:
  repository_dispatch:
    types: [deploy_preview]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Webpage File
        run: |
          # Schreibt den KI-Content in die index.html
          echo '${{ github.event.client_payload.content }}' > index.html
